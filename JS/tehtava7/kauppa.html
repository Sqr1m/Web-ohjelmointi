<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kauppa</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255, 255, 255, 0.10);
      --card-border: rgba(255, 255, 255, 0.18);
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.75);
      --accent: #7c3aed;
      --accent2: #22c55e;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.28), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.18), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.45;
      pointer-events: none;
      animation: float 10s ease-in-out infinite;
    }

    .blob.one {
      width: 220px;
      height: 220px;
      background: rgba(124, 58, 237, 0.45);
      top: -50px;
      left: -60px;
    }

    .blob.two {
      width: 180px;
      height: 180px;
      background: rgba(34, 197, 94, 0.35);
      bottom: 10%;
      right: -40px;
      animation-delay: -3s;
    }

    .blob.three {
      width: 140px;
      height: 140px;
      background: rgba(59, 130, 246, 0.28);
      top: 35%;
      right: 18%;
      animation-delay: -6s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px) scale(1); }
      50% { transform: translateY(-18px) translateX(10px) scale(1.05); }
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 56px;
      position: relative;
      z-index: 1;
    }

    .hero {
      margin-bottom: 24px;
      padding: 26px 28px;
      border: 1px solid var(--card-border);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      animation: fadeIn 0.7s ease both;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeInUp 0.8s ease both;
    }

    .product-card {
      display: grid;
      grid-template-columns: 170px 1fr;
      min-height: 260px;
    }

    .product-visual {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.18), transparent 35%),
        linear-gradient(160deg, rgba(124, 58, 237, 0.55), rgba(59, 130, 246, 0.28));
      position: relative;
    }

    .product-visual::after {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .mug {
      font-size: 5rem;
      filter: drop-shadow(0 14px 18px rgba(0,0,0,0.25));
      animation: bounce 2.6s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .product-info {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .badge {
      display: inline-flex;
      align-self: flex-start;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .product-name {
      margin: 0;
      font-size: 1.9rem;
      line-height: 1.1;
    }

    .price {
      margin: 0;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
    }

    .price strong {
      font-size: 1.8rem;
      color: #fff;
    }

    .controls {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 12px;
      align-items: end;
      margin-top: 6px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    input[type="number"] {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.45);
      color: var(--text);
      outline: none;
      font-size: 1rem;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input[type="number"]:focus {
      border-color: rgba(124, 58, 237, 0.9);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2);
      transform: translateY(-1px);
    }

    .add-btn {
      height: 52px;
      border: none;
      border-radius: 16px;
      padding: 0 18px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(124, 58, 237, 0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(124, 58, 237, 0.45);
      filter: brightness(1.06);
    }

    .add-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .add-btn::after {
      content: "";
      position: absolute;
      top: -40%;
      left: -60%;
      width: 40%;
      height: 180%;
      background: rgba(255, 255, 255, 0.25);
      transform: rotate(20deg);
      transition: left 0.55s ease;
    }

    .add-btn:hover::after {
      left: 120%;
    }

    .add-btn.pulse {
      animation: pulse 0.45s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .cart-card {
      padding: 22px;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
    }

    .cart-header h2 {
      margin: 0;
      font-size: 1.4rem;
    }

    .cart-meta {
      color: var(--muted);
      font-size: 0.92rem;
    }

    #cart {
      display: grid;
      gap: 10px;
    }

    .cart-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      animation: popIn 0.3s ease both;
    }

    .cart-item strong {
      display: block;
      margin-bottom: 2px;
    }

    .cart-item span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .item-total {
      font-weight: 700;
      white-space: nowrap;
    }

    .empty {
      padding: 18px 16px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
    }

    .total-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.16), rgba(16, 185, 129, 0.10));
      border: 1px solid rgba(34, 197, 94, 0.22);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 1.05rem;
    }

    .total-box strong {
      font-size: 1.35rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .product-card {
        grid-template-columns: 1fr;
      }

      .product-visual {
        min-height: 180px;
      }
    }

    @media (max-width: 540px) {
      .page {
        width: min(100% - 18px, 980px);
        padding-top: 18px;
      }

      .hero, .card {
        border-radius: 20px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .cart-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .cart-item {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="blob one"></div>
  <div class="blob two"></div>
  <div class="blob three"></div>

  <main class="page">
    <section class="hero">
      <h1>Shop</h1>
      <p></p>
    </section>

    <div class="grid">
      <section class="card product-card">
        <div class="product-visual">
          <div class="mug">☕</div>
        </div>

        <div class="product-info">
          <div class="badge">Featured product</div>
          <div id="product"></div>

          <div class="controls">
            <div>
              <label for="quantity">Quantity</label>
              <input type="number" id="quantity" value="1" min="1">
            </div>
            <button class="add-btn" type="button" onclick="addToCart()">Add to cart</button>
          </div>
        </div>
      </section>

      <section class="card cart-card">
        <div class="cart-header">
          <h2>Shopping Cart</h2>
          <div class="cart-meta">Updates instantly after each add</div>
        </div>

        <div id="cart"></div>
        <div id="total" class="total-box"></div>
      </section>
    </div>
  </main>

  <script>
    const product = {
      name: "Coffee Mug",
      price: 5.99
    };

    const cart = [];

    const productDiv = document.getElementById("product");
    const cartDiv = document.getElementById("cart");
    const totalDiv = document.getElementById("total");
    const quantityInput = document.getElementById("quantity");
    const addButton = document.querySelector(".add-btn");

    productDiv.innerHTML = `
      <h2 class="product-name">${product.name}</h2>
      <p class="price">Price: <strong>€${product.price.toFixed(2)}</strong></p>
    `;

    function addToCart() {
      let quantity = parseInt(quantityInput.value, 10);

      if (!quantity || quantity < 1) {
        quantity = 1;
        quantityInput.value = 1;
      }

      const item = {
        name: product.name,
        price: product.price,
        quantity: quantity,
        total: product.price * quantity
      };

      cart.push(item);
      updateCartView();

      addButton.classList.remove("pulse");
      void addButton.offsetWidth;
      addButton.classList.add("pulse");
    }

    function updateCartView() {
      cartDiv.innerHTML = "";
      let totalAmount = 0;

      if (cart.length === 0) {
        cartDiv.innerHTML = `<div class="empty">Your cart is empty.</div>`;
        totalDiv.innerHTML = `<span>Total amount</span><strong>€0.00</strong>`;
        return;
      }

      cart.forEach(function(item) {
        const line = document.createElement("div");
        line.className = "cart-item";
        line.innerHTML = `
          <div>
            <strong>${item.name}</strong>
            <span>${item.quantity} × €${item.price.toFixed(2)}</span>
          </div>
          <div class="item-total">€${item.total.toFixed(2)}</div>
        `;
        cartDiv.appendChild(line);
        totalAmount += item.total;
      });

      totalDiv.innerHTML = `
        <span>Total amount</span>
        <strong>€${totalAmount.toFixed(2)}</strong>
      `;
    }

    updateCartView();
  </script>
</body>
</html>
