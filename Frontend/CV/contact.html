<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bogdan — Contact</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script defer src="script.js"></script>
</head>
<body>
  <div id="progress" class="progress"></div>

  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">Bogdan</h1>
      <div class="nav-wrap">
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="about.html">About me</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="experience.html">Experience</a>
          <a href="contact.html" class="active" aria-current="page">Contact</a>
        </nav>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">☾</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section reveal">
      <h2>Contact</h2>
      <p>Replace the placeholders with your real links. The form currently shows a message and can be connected to backend later.</p>

      <div class="contact-grid" style="margin-top: 22px;">
        <div class="contact-list">
          <div class="contact-card">
            <small>Email</small>
            <a href="bogdan.verkhovod@vuoksi.fi">bogdan.verkhovod@vuoksi.fi</a>
          </div>
          <div class="contact-card">
            <small>LinkedIn</small>
            <a href="www.linkedin.com/in/bogdan-verkhovod-947ab3343/" target="_blank" rel="noreferrer">linkedin</a>
          </div>
          <div class="contact-card">
            <small>GitHub</small>
            <a href="https://github.com/Sqr1m/" target="_blank" rel="noreferrer">https://github.com/Sqr1m/</a>
          </div>
        </div>

        <form class="contact-form">
          <label>
            Name
            <input type="text" name="name" placeholder="Your name" required>
          </label>

          <label>
            Email
            <input type="email" name="email" placeholder="Your email" required>
          </label>

          <label>
            Message
            <textarea name="message" rows="7" placeholder="Write your message here..." required></textarea>
          </label>

          <div class="form-actions">
            <button type="submit" class="btn">Send message</button>
            <a class="btn ghost" href="bogdan.verkhovod@vuoksi.fi">Open mail app</a>
          </div>

          <p class="note"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> Bogdan</div>
  </footer>

  <div id="toast" class="toast"></div>
</body>
</html>
